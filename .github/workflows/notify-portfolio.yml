name: Notify Portfolio of CV Updates

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'portfolio-export.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portfolio Rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          # A Personal Access Token (PAT) with "repo" scope is required to trigger workflows in another repository.
          # You need to create this token in your GitHub Developer Settings and add it to this repository's secrets as PAT_FOR_PORTFOLIO.
          token: ${{ secrets.PAT_FOR_PORTFOLIO }}
          
          # UPDATE THIS: Replace with your actual GitHub username and the portfolio repository name.
          repository: lexandree/schaufenster
          
          # The custom event name that the portfolio repository will listen for.
          event-type: project-cv-updated
          
          # Optional payload to let the portfolio know which project was updated.
          client-payload: '{"project": "roentgen_for_docs"}'
